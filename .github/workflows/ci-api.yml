name: CI/CD — Customer Feedback API

on:
    push:
        branches: [main]
        paths:
            - "src/CustomerFeedbackAPI/**"
            - "infra/**"
    pull_request:
        branches: [main]
        paths:
            - "src/CustomerFeedbackAPI/**"

env:
    WORKING_DIR: src/CustomerFeedbackAPI
    PYTHON_VERSION: "3.12"
    # Set these as GitHub secrets:
    # AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, AZURE_ACR_NAME, API_APP_NAME

jobs:
    # ─── Build & Test ────────────────────────────────────────────────────
    build-test:
        name: "Build & Test"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install uv
              run: curl -LsSf https://astral.sh/uv/install.sh | sh

            - name: Install dependencies
              working-directory: ${{ env.WORKING_DIR }}
              run: uv sync

            - name: Lint (ruff)
              working-directory: ${{ env.WORKING_DIR }}
              run: uv run ruff check app/ tests/

            - name: Type check (mypy)
              working-directory: ${{ env.WORKING_DIR }}
              run: uv run mypy app/ --ignore-missing-imports

            - name: Run tests with coverage
              working-directory: ${{ env.WORKING_DIR }}
              run: uv run pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --junitxml=test-results.xml

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-api
                  path: ${{ env.WORKING_DIR }}/test-results.xml

            - name: Upload coverage
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-api
                  path: ${{ env.WORKING_DIR }}/coverage.xml

    # ─── Docker Build & Push ─────────────────────────────────────────────
    docker-push:
        name: "Docker Build & Push"
        runs-on: ubuntu-latest
        needs: build-test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Login to ACR
              run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

            - name: Build & push image
              working-directory: ${{ env.WORKING_DIR }}
              run: |
                  IMAGE=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/customer-feedback-api:${{ github.sha }}
                  IMAGE_LATEST=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/customer-feedback-api:latest
                  docker build -t $IMAGE -t $IMAGE_LATEST .
                  docker push $IMAGE
                  docker push $IMAGE_LATEST

    # ─── Deploy to Container Apps ────────────────────────────────────────
    deploy:
        name: "Deploy to Container Apps"
        runs-on: ubuntu-latest
        needs: docker-push
        environment: production
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Deploy to Container App
              run: |
                  az containerapp update \
                    --name ${{ secrets.API_APP_NAME }} \
                    --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                    --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/customer-feedback-api:${{ github.sha }}

            - name: Verify health
              run: |
                  FQDN=$(az containerapp show \
                    --name ${{ secrets.API_APP_NAME }} \
                    --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                    --query "properties.configuration.ingress.fqdn" -o tsv)
                  echo "API URL: https://$FQDN"
                  curl -sf "https://$FQDN/health" || (echo "Health check failed!" && exit 1)

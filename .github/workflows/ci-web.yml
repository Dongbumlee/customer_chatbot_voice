name: CI/CD — Customer Feedback Web

on:
    push:
        branches: [main]
        paths:
            - "src/CustomerFeedbackWeb/**"
    pull_request:
        branches: [main]
        paths:
            - "src/CustomerFeedbackWeb/**"

env:
    WORKING_DIR: src/CustomerFeedbackWeb
    NODE_VERSION: "22"

jobs:
    # ─── Build & Test ────────────────────────────────────────────────────
    build-test:
        name: "Build & Test"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install dependencies
              working-directory: ${{ env.WORKING_DIR }}
              run: npm ci --legacy-peer-deps

            - name: Lint (ESLint)
              working-directory: ${{ env.WORKING_DIR }}
              run: npx eslint src/ --max-warnings 0

            - name: Type check (TypeScript)
              working-directory: ${{ env.WORKING_DIR }}
              run: npx tsc --noEmit

            - name: Run tests
              working-directory: ${{ env.WORKING_DIR }}
              run: npx vitest run --coverage

            - name: Build production bundle
              working-directory: ${{ env.WORKING_DIR }}
              run: npm run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: web-dist
                  path: ${{ env.WORKING_DIR }}/dist

    # ─── Docker Build & Push ─────────────────────────────────────────────
    docker-push:
        name: "Docker Build & Push"
        runs-on: ubuntu-latest
        needs: build-test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Login to ACR
              run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

            - name: Build & push image
              working-directory: ${{ env.WORKING_DIR }}
              run: |
                  IMAGE=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/customer-feedback-web:${{ github.sha }}
                  IMAGE_LATEST=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/customer-feedback-web:latest
                  docker build -t $IMAGE -t $IMAGE_LATEST .
                  docker push $IMAGE
                  docker push $IMAGE_LATEST

    # ─── Deploy to Container Apps ────────────────────────────────────────
    deploy:
        name: "Deploy to Container Apps"
        runs-on: ubuntu-latest
        needs: docker-push
        environment: production
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Deploy to Container App
              run: |
                  az containerapp update \
                    --name ${{ secrets.WEB_APP_NAME }} \
                    --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                    --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/customer-feedback-web:${{ github.sha }}

            - name: Verify health
              run: |
                  FQDN=$(az containerapp show \
                    --name ${{ secrets.WEB_APP_NAME }} \
                    --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                    --query "properties.configuration.ingress.fqdn" -o tsv)
                  echo "Web URL: https://$FQDN"
                  curl -sf "https://$FQDN/health" || (echo "Health check failed!" && exit 1)
